<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="https://img.icons8.com/?size=32&id=OFHwDWASQWmX&format=png&color=000000">
<link rel="icon" type="image/png" sizes="16x16" href="https://img.icons8.com/?size=16&id=OFHwDWASQWmX&format=png&color=000000">
<title>LEE Coin Dashboard</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:linear-gradient(135deg,#000000,#1a0000);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.dashboard{
    width:95%;
    max-width:1100px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    font-weight:800;
    background:linear-gradient(90deg,#ff3c00,#ff7b00);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.back-btn{
    text-decoration:none;
    padding:10px 18px;
    border-radius:8px;
    background:linear-gradient(135deg,#ff3c00,#ff7b00);
    color:white;
    font-weight:600;
    transition:0.3s;
}

.back-btn:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 25px rgba(255,60,0,0.6);
}

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

.card{
    background:rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,60,0,0.3);
    transition:0.4s;
    transform-style:preserve-3d;
}

.card:hover{
    transform:rotateX(8deg) rotateY(-8deg) scale(1.05);
    box-shadow:0 25px 40px rgba(255,60,0,0.4);
}

.balance h2{
    font-weight:600;
    margin-bottom:10px;
    color:#ff7b00;
}

.balance .amount{
    font-size:2.5rem;
    font-weight:800;
}

.user{
    margin-top:15px;
    font-size:0.9rem;
    opacity:0.8;
}

.graph-card h2{
    margin-bottom:15px;
    color:#ff7b00;
}

.timeframe-buttons{
    display:flex;
    gap:10px;
    margin-bottom:12px;
}

.timeframe-buttons button{
    background:rgba(255,255,255,0.12);
    border:1px solid rgba(255,255,255,0.25);
    color:white;
    padding:6px 12px;
    border-radius:10px;
    cursor:pointer;
    font-size:0.85rem;
    transition:background 0.2s, transform 0.2s;
}

.timeframe-buttons button:hover{
    background:rgba(255,255,255,0.18);
    transform:translateY(-1px);
}

.timeframe-buttons button.active{
    background:rgba(255,123,0,0.9);
    border-color:rgba(255,123,0,0.9);
}

canvas{
    width:100%!important;
    height:250px!important;
}

.footer{
    margin-top:30px;
    text-align:center;
    opacity:0.5;
    font-size:0.8rem;
}
</style>
</head>
<body>

<div class="dashboard">

    <div class="header">
        <h1>LEE Coin Members Dashboard</h1>
        <a href="https://tycoon-x32.github.io/LEE.co/" class="back-btn">Back to Main Page</a>
    </div>

    <div class="cards">

        <div class="card balance">
            <h2>Wallet Balance</h2>
            <div class="amount">10 LEE COIN ($100)</div>
            <div class="user">1 LEE COIN = $10</div>
            <div class="user">Holder: Judah Munene</div>
            <div class="user">Owner Holds: 10 LEE COIN</div>
        </div>

        <div class="card graph-card">
            <h2>Market Growth</h2>
            <div class="timeframe-buttons">
                <button data-tf="1m" class="active">1m</button>
                <button data-tf="4h">4h</button>
                <button data-tf="1d">1d</button>
                <button data-tf="1M">1M</button>
            </div>
            <canvas id="priceChart"></canvas>
        </div>

    </div>

    <div class="footer">
        LEE COIN • Premium Member Access
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-chart-financial@0.2.0/dist/chartjs-chart-financial.min.js"></script>
<script>
const COIN_PRICE = 10;
const HOLDINGS = 10;

const balanceAmountEl = document.querySelector('.balance .amount');
if (balanceAmountEl) {
    balanceAmountEl.textContent = `${HOLDINGS} LEE COIN (~$${(HOLDINGS * COIN_PRICE).toFixed(2)})`;
}

function generateCandleData(basePrice, points, intervalMinutes, volatility = 0.02) {
    const data = [];
    let lastClose = basePrice;
    const now = Date.now();

    for (let i = points - 1; i >= 0; i--) {
        const time = now - i * intervalMinutes * 60_000;
        const open = lastClose;
        const change = (Math.random() * 2 - 1) * volatility * basePrice;
        const close = Math.max(0.01, open + change);
        const high = Math.max(open, close) + Math.random() * volatility * basePrice;
        const low = Math.min(open, close) - Math.random() * volatility * basePrice;

        data.push({
            x: time,
            o: open,
            h: high,
            l: Math.max(0.01, low),
            c: close
        });

        lastClose = close;
    }

    return data;
}

const timeframes = {
    '1m': { label: '1m', points: 60, intervalMinutes: 1, unit: 'minute' },
    '4h': { label: '4h', points: 48, intervalMinutes: 5, unit: 'hour' },
    '1d': { label: '1d', points: 24, intervalMinutes: 60, unit: 'hour' },
    '1M': { label: '1M', points: 30, intervalMinutes: 60 * 24, unit: 'day' }
};

const ctx = document.getElementById('priceChart').getContext('2d');
let priceChart;

function createChart(data, timeframeKey) {
    const timeConfig = timeframes[timeframeKey] || timeframes['1m'];

    return new Chart(ctx, {
        type: 'candlestick',
        data: {
            datasets: [{
                label: `LEE Coin ($${COIN_PRICE})`,
                data,
                color: {
                    up: 'rgba(0,200,0,0.65)',
                    down: 'rgba(255,80,80,0.65)',
                    unchanged: 'rgba(200,200,200,0.65)'
                },
                borderColor: {
                    up: 'rgba(0,200,0,0.9)',
                    down: 'rgba(255,80,80,0.9)',
                    unchanged: 'rgba(200,200,200,0.9)'
                },
                borderWidth: 1,
                barPercentage: 0.6,
                categoryPercentage: 0.75
            }]
        },
        options: {
            plugins: {
                legend: { labels: { color: 'white' } },
                tooltip: {
                    callbacks: {
                        label(ctx) {
                            const p = ctx.parsed;
                            return `O:${p.o.toFixed(2)} H:${p.h.toFixed(2)} L:${p.l.toFixed(2)} C:${p.c.toFixed(2)}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    type: 'timeseries',
                    time: {
                        unit: timeConfig.unit,
                        tooltipFormat: 'MMM d, HH:mm'
                    },
                    ticks: { color: 'white' },
                    grid: { color: 'rgba(255,255,255,0.1)' }
                },
                y: {
                    ticks: { color: 'white' },
                    grid: { color: 'rgba(255,255,255,0.1)' },
                    beginAtZero: false
                }
            }
        }
    });
}

function updateChart(timeframeKey) {
    const cfg = timeframes[timeframeKey] || timeframes['1m'];
    const data = generateCandleData(COIN_PRICE, cfg.points, cfg.intervalMinutes, 0.02);

    if (priceChart) {
        priceChart.data.datasets[0].data = data;
        priceChart.options.scales.x.time.unit = cfg.unit;
        priceChart.update();
        return;
    }

    priceChart = createChart(data, timeframeKey);
}

document.querySelectorAll('.timeframe-buttons button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.timeframe-buttons button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        updateChart(btn.dataset.tf);
    });
});

updateChart('1m');
</script>

</body>

</html>
